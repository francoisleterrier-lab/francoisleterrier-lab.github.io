<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — François Leterrier</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#06070e">
<link rel="icon" type="image/png" sizes="180x180" href="/favicon-180.png">
<link rel="apple-touch-icon" href="/favicon-180.png">
<link rel="preload" as="font" type="font/woff2" href="/fonts/bricolagegrotesque-800-latin-11.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="/fonts/manrope-400-latin-17.woff2" crossorigin>
<link rel="preload" href="/fonts.css" as="style" onload="this.rel='stylesheet'"><noscript><link rel="stylesheet" href="/fonts.css"></noscript>
<link rel="stylesheet" href="/aurora.css">
<style>
  :root{--bg0:#06070e;--txt:#e7ecf6;--muted:#97a1b8;--line:rgba(255,255,255,.12);--cyan:#22d3ee;--grad:linear-gradient(120deg,#22d3ee,#4f7dff 38%,#a855f7 70%,#d946ef 100%);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Manrope',sans-serif;background:var(--bg0);color:var(--txt);min-height:100vh;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden;position:relative;}
  body::before{content:"";position:absolute;top:-22%;right:-12%;width:560px;height:560px;
    background:radial-gradient(circle,rgba(34,211,238,.24),transparent 60%);filter:blur(12px);}
  body::after{content:"";position:absolute;bottom:-28%;left:-12%;width:520px;height:520px;
    background:radial-gradient(circle,rgba(168,85,247,.2),transparent 62%);filter:blur(14px);}
  .box{position:relative;z-index:2;max-width:560px;}
  .brand{display:inline-flex;align-items:center;gap:11px;font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;color:#fff;text-decoration:none;margin-bottom:30px;}
  .brand img{width:40px;height:40px;border-radius:8px;}
  .brand small{display:block;font-family:'Manrope';font-weight:600;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);margin-top:2px;}
  .code{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(80px,16vw,118px);letter-spacing:-.04em;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;}
  h1{font-family:'Bricolage Grotesque';font-weight:700;font-size:26px;margin:10px 0 10px;color:#fff;}
  p{color:var(--muted);font-size:16px;margin-bottom:28px;}
  a.btn{display:inline-flex;align-items:center;gap:9px;background:var(--grad);color:#08111f;font-weight:700;
    font-size:15px;padding:14px 26px;border-radius:30px;text-decoration:none;box-shadow:0 0 24px -6px rgba(34,211,238,.6);transition:transform .18s;}
  a.btn:hover{transform:translateY(-2px);}
  .links{margin-top:26px;font-size:14px;color:var(--muted);line-height:2;}
  .links a{color:var(--cyan);font-weight:600;text-decoration:none;}
  .links a:hover{text-decoration:underline;}
</style>
</head>
<body>
  <div class="box">
    <a class="brand" href="/"><img src="/logo.png" alt="Logo FL — François Leterrier">François Leterrier<small>Community Manager · Web</small></a>
    <div class="code">404</div>
    <h1>Cette page n'existe pas (ou plus)</h1>
    <p>Pas de panique — revenons à l'essentiel : votre présence en ligne dans le Sud-Toulousain.</p>
    <a class="btn" href="/">← Retour à l'accueil</a>
    <div class="links">
      Ou allez directement à :
      <a href="/creation-site-internet.html">Création de site</a> ·
      <a href="/community-manager.html">Réseaux sociaux</a> ·
      <a href="/realisations.html">Réalisations</a> ·
      <a href="/blog/">Blog</a> ·
      <a href="/contact.html">Contact</a>
    </div>
  </div>
<script src="/consent.js" defer></script>
</body>
</html>
