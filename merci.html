<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci ! — Votre message est envoyé | François Leterrier</title>
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#06070e">
<link rel="icon" type="image/png" sizes="180x180" href="favicon-180.png">
<link rel="apple-touch-icon" href="favicon-180.png">
<link rel="preload" as="font" type="font/woff2" href="/fonts/bricolagegrotesque-800-latin-11.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="/fonts/manrope-400-latin-17.woff2" crossorigin>
<link rel="preload" href="/fonts.css" as="style" onload="this.rel='stylesheet'"><noscript><link rel="stylesheet" href="/fonts.css"></noscript>
<link rel="stylesheet" href="/aurora.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Manrope',sans-serif;background:#06070e;color:#e7ecf6;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;position:relative;overflow:hidden;}
  body::before{content:"";position:absolute;top:-20%;right:-10%;width:620px;height:620px;background:radial-gradient(circle,rgba(34,211,238,.28),transparent 62%);filter:blur(12px);}
  body::after{content:"";position:absolute;bottom:-22%;left:-12%;width:560px;height:560px;background:radial-gradient(circle,rgba(168,85,247,.26),transparent 62%);filter:blur(14px);}
  .box{position:relative;z-index:2;max-width:520px;}
  .check{width:88px;height:88px;border-radius:50%;background:linear-gradient(120deg,#22d3ee,#a855f7);display:flex;align-items:center;justify-content:center;margin:0 auto 26px;box-shadow:0 0 40px -6px rgba(34,211,238,.6);}
  .check svg{width:44px;height:44px;stroke:#06070e;stroke-width:3.5;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:34px;letter-spacing:-.02em;margin-bottom:12px;color:#fff;}
  p{color:#aab2c6;font-size:16.5px;margin-bottom:30px;}
  a.btn{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(120deg,#22d3ee,#a855f7);color:#08111f;font-weight:700;font-size:15px;padding:14px 26px;border-radius:30px;text-decoration:none;box-shadow:0 0 26px -6px rgba(34,211,238,.6);transition:transform .18s;}
  a.btn:hover{transform:translateY(-2px);}
  .small{margin-top:20px;font-size:13px;color:#8b93a8;}
  .small a{color:#22d3ee;text-decoration:none;}
  .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .btn2{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.18);color:#e7ecf6;font-family:'Manrope',sans-serif;font-weight:600;font-size:14.5px;padding:13px 22px;border-radius:30px;text-decoration:none;cursor:pointer;transition:border-color .18s,transform .18s;}
  .btn2:hover{border-color:#22d3ee;transform:translateY(-2px);}
</style>
</head>
<body>
  <div class="box">
    <div class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <h1>Merci, c'est envoyé&nbsp;!</h1>
    <p>Votre message est bien arrivé. Je vous réponds <b>sous 48&nbsp;h ouvrées</b> en moyenne. À très vite pour parler de votre projet&nbsp;!</p>
    <div class="btns">
      <a class="btn" href="https://calendly.com/fl-conceptimmoplus/30min" target="_blank" rel="noopener">📅 Réserver un créneau</a>
      <button type="button" class="btn2" id="icsBtn">🔔 Ajouter un rappel</button>
      <a class="btn2" href="/">← Accueil</a>
    </div>
    <p class="small">Une urgence&nbsp;? Appelez le <a href="tel:+33698200208">06 98 20 02 08</a></p>
  </div>
<script>
  (function () {
    var b = document.getElementById('icsBtn');
    if (!b) return;
    b.addEventListener('click', function () {
      function z(n) { return (n < 10 ? '0' : '') + n; }
      function loc(x) { return x.getFullYear() + z(x.getMonth() + 1) + z(x.getDate()) + 'T' + z(x.getHours()) + z(x.getMinutes()) + '00'; }
      function utc(x) { return x.getUTCFullYear() + z(x.getUTCMonth() + 1) + z(x.getUTCDate()) + 'T' + z(x.getUTCHours()) + z(x.getUTCMinutes()) + '00Z'; }
      var d = new Date(); d.setDate(d.getDate() + 2); d.setHours(10, 0, 0, 0);
      var end = new Date(d.getTime() + 1800000);
      var ics = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Francois Leterrier//FR', 'BEGIN:VEVENT', 'UID:' + loc(d) + '-fl@francoisleterrier.fr', 'DTSTAMP:' + utc(new Date()), 'DTSTART:' + loc(d), 'DTEND:' + loc(end), 'SUMMARY:Relancer François Leterrier si pas de nouvelles', 'DESCRIPTION:Vous avez contacté François Leterrier (Community Manager & création de sites). Le relancer si besoin. Tél : 06 98 20 02 08', 'END:VEVENT', 'END:VCALENDAR'].join('\r\n');
      var a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([ics], { type: 'text/calendar' }));
      a.download = 'rappel-francois-leterrier.ics';
      document.body.appendChild(a); a.click();
      setTimeout(function () { URL.revokeObjectURL(a.href); document.body.removeChild(a); }, 100);
      b.textContent = '✓ Rappel téléchargé';
    });
  })();
</script>
<script src="/consent.js" defer></script>
</body>
</html>
